<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>10-Emerald | Classmates</title>
    
    <style>
        /* Simple Style Code */
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .navbar {
            background-color: #2d5a27; /* Emerald Green */
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 14px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .main-wrapper {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header h1 {
            text-align: center;
            color: #2d5a27;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #2d5a27;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background-color: #2d5a27;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .list-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #f4f7f6;
            padding-bottom: 5px;
        }

        #output1 {
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div style="font-size: 22px; font-weight: bold;">10-EMERALD</div>
        <div>
            <a href="index.html">Classmates</a>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="container">
            <div class="header">
                <h1>Classmate Info System</h1>
            </div>
            
            <div class="card">
                <input type="text" id="name" placeholder="Enter Full Name" autocomplete="off">
                <input type="text" id="sec" value="10-Emerald" readonly style="background-color: #eee;">
                <input type="text" id="subj" placeholder="Favorite Subject" autocomplete="off">
                <div class="btn-group">
                    <button py-click="addstudent">Add Record</button>
                    <button py-click="showclasslist" style="background:#fff; color:#2d5a27; border: 1px solid #2d5a27;">Show List</button>
                </div>
            </div>

            <div class="card">
                <div class="list-title">Student Records</div>
                <div id="output1"></div>
            </div>
        </div>
    </div>
    <script type="py" src="main.py"></script>
</body>
</html>
